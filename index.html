<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Professor Trelawney's Daily Divinations</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(170deg, #0a0118 0%, #110a2a 30%, #0d1b2a 60%, #0a0118 100%);
    color: #fff;
    overflow-x: hidden;
    font-family: 'Crimson Text', serif;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.15; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.5); }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(123,47,247,0.5); }
    50% { transform: scale(1.08); box-shadow: 0 0 50px rgba(123,47,247,0.7); }
  }
  @keyframes fadeInOut {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes headerGlow {
    0%, 100% { text-shadow: 0 0 20px rgba(241,196,15,0.3), 0 0 40px rgba(241,196,15,0.1); }
    50% { text-shadow: 0 0 30px rgba(241,196,15,0.5), 0 0 60px rgba(241,196,15,0.2); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #starfield { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star {
    position: absolute; border-radius: 50%; background: #f1c40f;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 820px; margin: 0 auto;
    padding: 50px 24px 60px;
  }

  .header {
    text-align: center; margin-bottom: 48px;
    animation: slideUp 0.8s ease-out;
  }
  .header-sub {
    font-size: 13px; letter-spacing: 4px; text-transform: uppercase;
    color: rgba(241, 196, 15, 0.5); margin-bottom: 12px;
  }
  .header h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(28px, 5vw, 44px); font-weight: 700;
    color: #f1c40f; line-height: 1.2;
    animation: headerGlow 4s ease-in-out infinite;
    margin-bottom: 10px;
  }
  .header-date {
    font-size: 15px; color: rgba(255,255,255,0.4); letter-spacing: 1px;
  }
  .header-line {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(241,196,15,0.4), transparent);
    margin: 18px auto 0;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 10px; margin-bottom: 40px;
    animation: slideUp 0.8s 0.2s ease-out both;
  }

  .sign-btn {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(241,196,15,0.1);
    border-radius: 12px; padding: 14px 8px;
    cursor: pointer; transition: all 0.3s ease;
    display: flex; flex-direction: column;
    align-items: center; gap: 6px; color: #fff;
    position: relative; overflow: hidden;
  }
  .sign-btn::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at center, rgba(241,196,15,0.08) 0%, transparent 70%);
    opacity: 0; transition: opacity 0.3s;
  }
  .sign-btn:hover::before { opacity: 1; }
  .sign-btn:hover {
    border-color: rgba(241,196,15,0.35);
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  }
  .sign-btn.active {
    border-color: rgba(241,196,15,0.5);
    background: rgba(241,196,15,0.06);
    box-shadow: 0 0 25px rgba(241,196,15,0.1), inset 0 0 20px rgba(241,196,15,0.03);
  }
  .sign-symbol { font-size: 28px; line-height: 1; }
  .sign-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 10px; letter-spacing: 0.5px;
    color: rgba(255,255,255,0.6); transition: color 0.3s;
  }
  .sign-btn.active .sign-name { color: #f1c40f; }
  .sign-element {
    font-size: 8px; letter-spacing: 1px;
    text-transform: uppercase; font-family: 'Crimson Text', serif;
  }

  .reading-area {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(241, 196, 15, 0.1);
    border-radius: 16px; padding: 30px 28px;
    backdrop-filter: blur(10px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.3), inset 0 1px 0 rgba(241,196,15,0.05);
    animation: slideUp 0.5s ease-out;
    display: none;
  }
  .reading-area.visible { display: block; }

  .reading-header { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
  .reading-symbol { font-size: 32px; }
  .reading-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 22px; color: #f1c40f; margin: 0;
  }
  .reading-dates {
    font-size: 12px; color: rgba(255,255,255,0.35);
    margin: 0; letter-spacing: 1px;
  }

  .loading { display: flex; flex-direction: column; align-items: center; gap: 18px; padding: 40px 0; }
  .loading-orb {
    width: 60px; height: 60px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #a88beb, #7b2ff7 40%, #1a0533 80%);
    box-shadow: 0 0 30px rgba(123, 47, 247, 0.5), 0 0 60px rgba(123, 47, 247, 0.2);
    animation: pulse 1.5s ease-in-out infinite;
  }
  .loading-text {
    font-size: 16px; color: rgba(241, 196, 15, 0.7);
    letter-spacing: 2px; animation: fadeInOut 2s ease-in-out infinite;
  }

  .card { animation: cardReveal 0.6s ease-out forwards; opacity: 0; }
  .card-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 20px; padding-bottom: 16px;
    border-bottom: 1px solid rgba(241, 196, 15, 0.15);
  }
  .card-avatar {
    width: 50px; height: 50px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; border: 1px solid rgba(241, 196, 15, 0.2);
  }
  .card-character {
    margin: 0; font-family: 'Cinzel Decorative', serif;
    font-size: 20px; color: #f1c40f;
    text-shadow: 0 0 10px rgba(241, 196, 15, 0.3);
  }
  .card-label {
    margin: 0; font-size: 11px; color: rgba(255,255,255,0.4);
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  .card-horoscope {
    font-size: 17px; line-height: 1.75;
    color: rgba(255, 255, 255, 0.82); margin: 0 0 22px;
  }
  .card-quote-box {
    background: rgba(241, 196, 15, 0.04);
    border: 1px solid rgba(241, 196, 15, 0.12);
    border-radius: 8px; padding: 16px 20px; position: relative;
  }
  .card-quote-mark {
    position: absolute; top: -8px; left: 18px;
    font-size: 24px; color: rgba(241, 196, 15, 0.4);
    font-family: 'Cinzel Decorative', serif;
  }
  .card-quote {
    font-size: 16px; font-style: italic; line-height: 1.65;
    color: rgba(241, 196, 15, 0.75); margin: 0;
  }
  .card-attribution {
    font-size: 12px; color: rgba(255,255,255,0.35);
    margin: 8px 0 0; text-align: right;
  }

  .empty-state {
    text-align: center; padding: 40px 20px;
    animation: slideUp 0.8s 0.4s ease-out both;
  }
  .empty-state p {
    font-size: 18px; font-style: italic;
    color: rgba(255,255,255,0.3); line-height: 1.7;
  }
  .error-text { color: #e74c3c; text-align: center; padding: 20px; }

  .footer {
    text-align: center; margin-top: 50px;
    font-size: 11px; color: rgba(255,255,255,0.15); letter-spacing: 2px;
  }
</style>
</head>
<body>

<div id="starfield"></div>

<div class="container">
  <div class="header">
    <p class="header-sub">✦ Divination Tower ✦</p>
    <h1>Professor Trelawney's<br>Daily Divinations</h1>
    <p class="header-date" id="today-date"></p>
    <div class="header-line"></div>
  </div>

  <div class="grid" id="zodiac-grid"></div>

  <div class="reading-area" id="reading-area">
    <div class="reading-header">
      <span class="reading-symbol" id="reading-symbol"></span>
      <div>
        <h2 class="reading-title" id="reading-title"></h2>
        <p class="reading-dates" id="reading-dates"></p>
      </div>
    </div>
    <div id="reading-content"></div>
  </div>

  <div class="empty-state" id="empty-state">
    <p>Select your sign above to reveal<br>what the stars and the Sorting Hat<br>have in store for you today.</p>
  </div>

  <p class="footer">✦ Powered by the Department of Mysteries ✦</p>
</div>

<script>
const ZODIAC_SIGNS = [
  { name: "Aries", symbol: "♈", dates: "Mar 21 – Apr 19", element: "Fire" },
  { name: "Taurus", symbol: "♉", dates: "Apr 20 – May 20", element: "Earth" },
  { name: "Gemini", symbol: "♊", dates: "May 21 – Jun 20", element: "Air" },
  { name: "Cancer", symbol: "♋", dates: "Jun 21 – Jul 22", element: "Water" },
  { name: "Leo", symbol: "♌", dates: "Jul 23 – Aug 22", element: "Fire" },
  { name: "Virgo", symbol: "♍", dates: "Aug 23 – Sep 22", element: "Earth" },
  { name: "Libra", symbol: "♎", dates: "Sep 23 – Oct 22", element: "Air" },
  { name: "Scorpio", symbol: "♏", dates: "Oct 23 – Nov 21", element: "Water" },
  { name: "Sagittarius", symbol: "♐", dates: "Nov 22 – Dec 21", element: "Fire" },
  { name: "Capricorn", symbol: "♑", dates: "Dec 22 – Jan 19", element: "Earth" },
  { name: "Aquarius", symbol: "♒", dates: "Jan 20 – Feb 18", element: "Air" },
  { name: "Pisces", symbol: "♓", dates: "Feb 19 – Mar 20", element: "Water" },
];

const ELEMENT_COLORS = {
  Fire: { primary: "#c0392b", glow: "rgba(231, 76, 60, 0.3)" },
  Earth: { primary: "#8B7355", glow: "rgba(139, 115, 85, 0.3)" },
  Air: { primary: "#7f8c8d", glow: "rgba(149, 165, 166, 0.3)" },
  Water: { primary: "#2471a3", glow: "rgba(52, 152, 219, 0.3)" },
};

const cache = {};
let selected = null;

// Today's date
const today = new Date().toLocaleDateString("en-US", {
  weekday: "long", year: "numeric", month: "long", day: "numeric",
});
document.getElementById("today-date").textContent = today;

// Star field
(function createStars() {
  const field = document.getElementById("starfield");
  for (let i = 0; i < 80; i++) {
    const star = document.createElement("div");
    star.className = "star";
    const size = Math.random() * 2.5 + 0.5;
    star.style.cssText = `
      left: ${Math.random() * 100}%; top: ${Math.random() * 100}%;
      width: ${size}px; height: ${size}px; opacity: 0.2;
      animation: twinkle ${Math.random() * 3 + 2}s ${Math.random() * 5}s ease-in-out infinite;
    `;
    field.appendChild(star);
  }
})();

// Build zodiac grid
(function buildGrid() {
  const grid = document.getElementById("zodiac-grid");
  ZODIAC_SIGNS.forEach((sign) => {
    const btn = document.createElement("button");
    btn.className = "sign-btn";
    btn.dataset.name = sign.name;
    const colors = ELEMENT_COLORS[sign.element];
    btn.innerHTML = `
      <span class="sign-symbol">${sign.symbol}</span>
      <span class="sign-name">${sign.name}</span>
      <span class="sign-element" style="color:${colors.primary}">${sign.element}</span>
    `;
    btn.addEventListener("click", () => fetchReading(sign));
    grid.appendChild(btn);
  });
})();

function showLoading() {
  return `<div class="loading">
    <div class="loading-orb"></div>
    <p class="loading-text">The stars are aligning...</p>
  </div>`;
}

function showCard(reading, sign) {
  const colors = ELEMENT_COLORS[sign.element];
  return `<div class="card">
    <div class="card-header">
      <div class="card-avatar" style="background:linear-gradient(135deg,${colors.primary},#1a0533);box-shadow:0 0 20px ${colors.glow}">
        ${sign.symbol}
      </div>
      <div>
        <h3 class="card-character">${reading.character}</h3>
        <p class="card-label">Your guide today</p>
      </div>
    </div>
    <p class="card-horoscope">${reading.horoscope}</p>
    <div class="card-quote-box">
      <span class="card-quote-mark">"</span>
      <p class="card-quote">${reading.quote}</p>
      <p class="card-attribution">— ${reading.character}</p>
    </div>
  </div>`;
}

async function fetchReading(sign) {
  // Update selection UI
  document.querySelectorAll(".sign-btn").forEach((b) =>
    b.classList.toggle("active", b.dataset.name === sign.name)
  );
  selected = sign.name;
  document.getElementById("empty-state").style.display = "none";

  const area = document.getElementById("reading-area");
  area.classList.add("visible");
  document.getElementById("reading-symbol").textContent = sign.symbol;
  document.getElementById("reading-title").textContent = sign.name;
  document.getElementById("reading-dates").textContent = sign.dates;

  const content = document.getElementById("reading-content");

  const cacheKey = sign.name + "-" + new Date().toDateString();
  if (cache[cacheKey]) {
    content.innerHTML = showCard(cache[cacheKey], sign);
    return;
  }

  content.innerHTML = showLoading();

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": window.ANTHROPIC_API_KEY || "",
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [
          {
            role: "user",
            content: `You are a mystical astrologer at Hogwarts School of Witchcraft and Wizardry. Today is ${today}. Generate a daily horoscope for the zodiac sign ${sign.name} (${sign.element} element).

Pick ONE Harry Potter character who best embodies today's energy for this sign. Then write:
1. A 2-3 sentence horoscope in a mystical but warm tone, weaving in themes relevant to ${sign.name} and subtle Harry Potter world references.
2. A short original quote (1-2 sentences) that this character might say, matching the horoscope's theme. Make it sound authentically like that character.

Respond ONLY with a JSON object, no markdown fences:
{"character": "Character Name", "horoscope": "The horoscope text...", "quote": "The quote text..."}`,
          },
        ],
      }),
    });
    const data = await response.json();
    const text = data.content.map((b) => b.text || "").join("");
    const cleaned = text.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(cleaned);
    cache[cacheKey] = parsed;
    content.innerHTML = showCard(parsed, sign);
  } catch (err) {
    console.error(err);
    content.innerHTML = '<p class="error-text">The crystal ball has gone dark. Please try again.</p>';
  }
}
</script>
</body>
</html>
